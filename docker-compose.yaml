
services:
  alpine:
    image: "rlib/rig-alpine:latest"
    build:
      context: .
      dockerfile: tools/Dockerfile-alpine

  ubuntu:
    image: "rlib/rig-ubuntu:latest"
    build:
      context: .
      dockerfile: tools/Dockerfile-ubuntu

volumes:
  # Whole CARGO_HOME (registry + git + the .package-cache lock) on one volume,
  # so concurrent containers share cargo's flock and serialize cache writes
  # instead of clobbering each other.
  cargo-cache:
  rig-linux-target-alpine:
  rig-linux-target-ubuntu:

name: sign-windows.yaml

on:
  workflow_dispatch:
    inputs:
      signing-policy:
        description: 'SignPath signing policy'
        required: true
        default: 'test-signing'
        type: choice
        options:
          - test-signing
          - release-signing

env:
  RUST_BACKTRACE: 1

jobs:

  windows:
    runs-on: ${{ matrix.config.runner }}
    name: ${{ matrix.config.name }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows x86_64 (signed)
            runner: windows-2022
            arch: x86_64
          - name: Windows aarch64 (signed)
            runner: windows-11-arm
            arch: aarch64

    steps:

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 10

    - name: Install rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install make
      run: choco install make

    - name: Install curl
      run: choco install curl

    - run: |
        make win
      shell: bash

    - uses: actions/upload-artifact@v7
      id: upload-unsigned-artifact
      with:
        name: rig-windows-${{ matrix.config.arch }}-unsigned
        path: 'rig-*.exe'

    - uses: signpath/github-action-submit-signing-request@v2
      with:
        api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
        organization-id: 'ce0224dd-53d3-46e4-8e82-b71df4fcef90'
        project-slug: 'rig'
        signing-policy-slug: '${{ inputs.signing-policy }}'
        github-artifact-id: '${{ steps.upload-unsigned-artifact.outputs.artifact-id }}'
        wait-for-completion: true
        output-artifact-directory: 'signed'

    - uses: actions/upload-artifact@v7
      with:
        name: rig-windows-${{ matrix.config.arch }}-signed
        path: 'signed/*'

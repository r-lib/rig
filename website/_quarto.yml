project:
  type: website
  output-dir: _site
  # Writes _variables.yml with the crate version from ../Cargo.toml so the
  # Get started hero can show it via {{< var version >}}.
  pre-render: ./gen-version.sh
  # User-mode install scripts, served from the site root
  # (https://r-lib.github.io/rig/install.sh and install.ps1).
  resources:
    - install.sh
    - install.ps1

website:
  title: "rig"
  description: "The R Installation Manager"
  site-url: https://r-lib.github.io/rig/
  repo-url: https://github.com/r-lib/rig
  favicon: assets/rig-app.png
  navbar:
    background: primary
    search: true
    tools:
      - icon: github
        href: https://github.com/r-lib/rig
        text: GitHub
  sidebar:
    style: docked
    search: true
    # Keep all top-level entries (e.g. the "Guide" section) expanded; never
    # collapse them. collapse-level must exceed the sidebar's nesting depth.
    collapse-level: 3
    contents:
      - text: "Get started"
        file: index.qmd
      - section: "Guide"
        contents:
          - text: "Installing rig"
            file: install.qmd
          - text: "Admin mode vs user mode"
            file: admin-vs-user-mode.qmd
          - text: "macOS menu bar app"
            file: macos-app.qmd
          - text: "Docker containers"
            file: docker.qmd
          - text: "FAQ"
            file: faq.qmd
      - section: "Reference"
        href: reference/index.qmd
        contents:
          - auto: "reference/*.qmd"
      - text: "Changelog"
        file: news.qmd

format:
  html:
    # Providing a light and a dark theme makes Quarto add a light/dark toggle
    # to the navbar automatically.
    theme:
      light: [cosmo, theme.scss]
      dark: [darkly, theme.scss]
    # Seed the dark theme on first visit when the OS/browser prefers dark.
    include-in-header:
      - _dark-default.html
    toc: true
